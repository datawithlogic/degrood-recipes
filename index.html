<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deGrood Recipes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a class="site-logo" href="index.html">deGrood <span>Recipes</span></a>
    <button class="filter-toggle" id="filterToggle" aria-label="Show filters">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="17" y2="6"/>
        <line x1="6" y1="10" x2="14" y2="10"/>
        <line x1="9" y1="14" x2="11" y2="14"/>
      </svg>
      Filters
    </button>
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="9" cy="9" r="6"/><line x1="15" y1="15" x2="19" y2="19"/>
      </svg>
      <input class="search-input" id="searchInput" type="search" placeholder="Search recipes…" autocomplete="off">
    </div>
  </div>
</header>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="layout-wrap">

  <!-- ─── Sidebar ───────────────────────────────────────────────── -->
  <nav class="sidebar" id="sidebar" aria-label="Recipe categories">
    <div class="nav-heading">Browse</div>
    <ul class="nav-list" id="navList"></ul>
  </nav>

  <!-- ─── Content ──────────────────────────────────────────────── -->
  <div class="content-area">
    <div class="content-header">
      <h1 class="content-title" id="contentTitle">The Family Cookbook</h1>
      <p class="content-sub" id="contentSub">Tested recipes, weight measurements, notes from the kitchen.</p>
    </div>
    <div class="recipe-grid" id="recipeGrid"></div>
  </div>

</div>

<script src="data/recipes.js"></script>
<script>
/* ─── State ── */
let activeCategory = 'All';
let activeSubcat   = 'All';
let searchQuery    = '';

/* ─── Sidebar builder ── */
function buildNav() {
  const list = document.getElementById('navList');

  const allActive = activeCategory === 'All';
  let html = `
    <li>
      <button class="nav-item ${allActive ? 'active' : ''}" data-cat="All">
        <span class="nav-item-inner">
          <span class="nav-emoji">🍽</span>
          <span class="nav-label">All Recipes</span>
        </span>
        <span class="nav-count">${RECIPES.length}</span>
      </button>
    </li>`;

  Object.entries(CATEGORIES).forEach(([cat, def]) => {
    const catRecipes = RECIPES.filter(r => r.category === cat);
    const isActive   = activeCategory === cat;
    const hasSubcats = def.subcats && def.subcats.length > 0;
    const isOpen     = isActive && hasSubcats;

    html += `
      <li class="nav-group">
        <button class="nav-item ${isActive && activeSubcat === 'All' ? 'active' : ''} ${isActive ? 'open' : ''}"
                data-cat="${cat}">
          <span class="nav-item-inner">
            <span class="nav-emoji">${def.emoji}</span>
            <span class="nav-label">${cat}</span>
          </span>
          <span class="nav-count">${catRecipes.length}</span>
          ${hasSubcats ? `<svg class="nav-arrow ${isOpen ? 'expanded' : ''}" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 6 8 10 12 6"/></svg>` : ''}
        </button>`;

    if (hasSubcats && isActive) {
      html += `<ul class="nav-sub-list">`;
      def.subcats.forEach(sc => {
        const scCount = RECIPES.filter(r => r.category === cat && r.subcat === sc).length;
        if (scCount === 0) return;
        const scActive = isActive && activeSubcat === sc;
        html += `
          <li>
            <button class="nav-sub-item ${scActive ? 'active' : ''}" data-cat="${cat}" data-sub="${sc}">
              <span class="nav-sub-label">${sc}</span>
              <span class="nav-count">${scCount}</span>
            </button>
          </li>`;
      });
      html += `</ul>`;
    }
    html += `</li>`;
  });

  list.innerHTML = html;

  /* wire up clicks */
  list.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => {
      const cat = btn.dataset.cat;
      if (cat === activeCategory && activeCategory !== 'All') {
        /* clicking same category toggles it closed / back to All */
        activeCategory = 'All';
        activeSubcat   = 'All';
      } else {
        activeCategory = cat;
        activeSubcat   = 'All';
      }
      closeSidebar();
      buildNav();
      renderGrid();
    });
  });

  list.querySelectorAll('.nav-sub-item').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCategory = btn.dataset.cat;
      activeSubcat   = btn.dataset.sub;
      closeSidebar();
      buildNav();
      renderGrid();
    });
  });
}

/* ─── Grid ── */
function renderGrid() {
  const q    = searchQuery.toLowerCase().trim();
  const grid = document.getElementById('recipeGrid');

  const filtered = RECIPES.filter(r => {
    const matchesCat    = activeCategory === 'All' || r.category === activeCategory;
    const matchesSubcat = activeSubcat   === 'All' || r.subcat   === activeSubcat;
    const matchesSearch = !q
      || r.title.toLowerCase().includes(q)
      || (r.description || '').toLowerCase().includes(q)
      || r.category.toLowerCase().includes(q)
      || (r.subcat || '').toLowerCase().includes(q);
    return matchesCat && matchesSubcat && matchesSearch;
  });

  /* update header label */
  const titleEl = document.getElementById('contentTitle');
  const subEl   = document.getElementById('contentSub');
  if (activeCategory === 'All') {
    titleEl.textContent = 'The Family Cookbook';
    subEl.textContent   = 'Tested recipes, weight measurements, notes from the kitchen.';
  } else {
    const def = CATEGORIES[activeCategory];
    titleEl.textContent = activeSubcat !== 'All'
      ? `${def.emoji} ${activeCategory} › ${activeSubcat}`
      : `${def.emoji} ${activeCategory}`;
    subEl.textContent = `${filtered.length} recipe${filtered.length !== 1 ? 's' : ''}`;
  }

  if (!filtered.length) {
    grid.innerHTML = `
      <div class="no-results">
        <p>No recipes found</p>
        <small>Try a different search or category</small>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map(r => {
    const cat   = CATEGORIES[r.category] || { color: '#374151', bg: '#f9fafb', emoji: '🍽' };
    const label = r.subcat ? `${r.subcat}` : r.category;
    return `
    <a class="recipe-card" href="recipe.html?slug=${encodeURIComponent(r.slug)}">
      <div class="card-thumb" style="background:${cat.bg}">${cat.emoji}</div>
      <div class="card-body">
        <span class="card-cat" style="color:${cat.color};background:${cat.bg}">${label}</span>
        <div class="card-title">${r.title}</div>
        <div class="card-desc">${r.description || ''}</div>
        <div class="card-meta">
          ${r.time  ? `<span>⏱ ${r.time}</span>`  : ''}
          ${r.yield ? `<span>👥 ${r.yield}</span>` : ''}
          ${r.skill ? `<span>📊 ${r.skill}</span>` : ''}
        </div>
      </div>
    </a>`;
  }).join('');
}

/* ─── Mobile sidebar toggle ── */
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('visible');
  document.body.style.overflow = 'hidden';
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('visible');
  document.body.style.overflow = '';
}

document.getElementById('filterToggle').addEventListener('click', openSidebar);
document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

/* ─── Search ── */
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderGrid();
});

/* Pre-fill from ?q= URL param */
const urlQ = new URLSearchParams(window.location.search).get('q') || '';
if (urlQ) {
  searchQuery = urlQ;
  document.getElementById('searchInput').value = urlQ;
}

buildNav();
renderGrid();
</script>
</body>
</html>
